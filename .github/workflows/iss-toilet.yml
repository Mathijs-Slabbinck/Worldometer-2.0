name: ISS Toilet Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run ISS toilet monitor
        working-directory: scripts
        run: node iss-monitor.mjs

      - name: Run update tracker (daily gate)
        working-directory: scripts
        run: node update-tracker.mjs

      - name: Run SATCAT update (6h gate)
        working-directory: scripts
        run: node satcat-update.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "ISS Toilet Bot"
          git config user.email "actions@github.com"
          git add TOILET_DATA.md data/last-updated.json data/satellite-stats.json data/satcat-pay.json data/satcat-starlink.json data/satcat-rb.json data/satcat-deb.json data/satcat-unk.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update ISS toilet telemetry + satellite catalog data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deployment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main',
            });
